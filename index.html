         <script>
async function updateStatus() {
    try {
        const response = await fetch("https://api.lanyard.rest/v1/users/950441249700188171");
        const data = await response.json();

        if (data.success) {
            const { discord_status, activities } = data.data;
            const statusText = document.getElementById('discord-status');
            const dot = document.getElementById('status-dot');

            const colors = {
                online: '#43b581',
                idle: '#faa61a',
                dnd: '#f04747',
                offline: '#747f8d'
            };

            dot.style.backgroundColor = colors[discord_status] || colors.offline;

            if (activities && activities.length > 0) {
                statusText.innerText =
                    activities[0].state ||
                    activities[0].details ||
                    "В мережі";
            } else {
                statusText.innerText =
                    discord_status === 'offline'
                        ? 'Не в мережі'
                        : 'В мережі';
            }
        }
    } catch (e) {
        console.error("Discord error", e);
    }
}

// 🔥 ОЦЕ ГОЛОВНЕ
updateStatus();
setInterval(updateStatus, 15000);
</script>
