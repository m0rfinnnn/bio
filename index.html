<script>
const segments = [];
const segmentCount = 30;

let mouseX = 0;
let mouseY = 0;

for (let i = 0; i < segmentCount; i++) {
    const div = document.createElement('div');
    div.classList.add('cursor-segment');
    document.body.appendChild(div);
    segments.push({
        element: div,
        x: 0,
        y: 0
    });
}

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate() {
    let x = mouseX;
    let y = mouseY;

    segments.forEach((segment, index) => {

        segment.x += (x - segment.x) * 0.25;
        segment.y += (y - segment.y) * 0.25;

        segment.element.style.left = segment.x + 'px';
        segment.element.style.top = segment.y + 'px';

        x = segment.x;
        y = segment.y;

        segment.element.style.opacity = 1 - index / segmentCount;
    });

    requestAnimationFrame(animate);
}

animate();
</script>
    <script>
        const DISCORD_ID = "950441249700188171";

        function startSite() {
            const overlay = document.getElementById("overlay");
            overlay.classList.add("overlay-hidden");
            setTimeout(() => {
                overlay.style.display = "none";
            }, 1000);
        }

        async function updateStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const data = await response.json();

                if (data.success) {
                    const { discord_status } = data.data;
                    const dot = document.getElementById("status-dot");
                    const statusText = document.getElementById("discord-status");

                    const colors = {
                        online: "#43b581",
                        idle: "#faa61a",
                        dnd: "#f04747",
                        offline: "#747f8d"
                    };

                    dot.style.backgroundColor = colors[discord_status] || colors.offline;

                    statusText.innerText =
                        discord_status === "offline"
                        ? "Не в мережі"
                        : "В мережі";
                }
            } catch {
                console.log("Discord error");
            }
        }

        updateStatus();
        setInterval(updateStatus, 15000);
    </script>
