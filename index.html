<script>
const cursor = document.querySelector('.cursor');
const trail = document.querySelector('.cursor-trail');

let mouseX = 0;
let mouseY = 0;
let trailX = 0;
let trailY = 0;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    cursor.style.left = mouseX + 'px';
    cursor.style.top = mouseY + 'px';
});

function animateTrail() {
    trailX += (mouseX - trailX) * 0.02;
    trailY += (mouseY - trailY) * 0.02;

    trail.style.left = trailX + 'px';
    trail.style.top = trailY + 'px';

    requestAnimationFrame(animateTrail);
}

animateTrail();
</script>
    <script>
        const DISCORD_ID = "950441249700188171";

        function startSite() {
            const overlay = document.getElementById("overlay");
            overlay.classList.add("overlay-hidden");
            setTimeout(() => {
                overlay.style.display = "none";
            }, 1000);
        }

        async function updateStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const data = await response.json();

                if (data.success) {
                    const { discord_status } = data.data;
                    const dot = document.getElementById("status-dot");
                    const statusText = document.getElementById("discord-status");

                    const colors = {
                        online: "#43b581",
                        idle: "#faa61a",
                        dnd: "#f04747",
                        offline: "#747f8d"
                    };

                    dot.style.backgroundColor = colors[discord_status] || colors.offline;

                    statusText.innerText =
                        discord_status === "offline"
                        ? "Не в мережі"
                        : "В мережі";
                }
            } catch {
                console.log("Discord error");
            }
        }

        updateStatus();
        setInterval(updateStatus, 15000);
    </script>
